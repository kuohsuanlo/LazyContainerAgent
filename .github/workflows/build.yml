name: Build & Verify

on:
  push:
    branches: [main, dev]
    tags: ['v*']
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # weekly Monday 6 AM: refresh mapping verification
  workflow_dispatch:
    inputs:
      java_versions:
        description: 'JDK versions to test (comma-separated)'
        default: '21,22,23'
        required: false
      paper:
        description: 'Run NMS scanner against Paper jars'
        type: boolean
        default: true
      bump_type:
        description: 'Bump version (patch/minor/major). Works on dev branch.'
        default: ''
        required: false

env:
  JAVA_VERSIONS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.java_versions || '21,22,23' }}

jobs:
  # ── 1. Build agent JAR on multiple JDKs ──
  build:
    name: Build JDK ${{ matrix.java }}
    if: github.actor != 'github-actions[bot]' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ${{ fromJSON(format('[{0}]', github.event_name == 'workflow_dispatch' && github.event.inputs.java_versions || '21,22,23')) }}
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
      - name: Determine version (tag → strip v prefix, else pom.xml + short sha)
        id: version
        run: |
          if [[ "${{ github.ref }}" =~ ^refs/tags/v(.+)$ ]]; then
            TAG_VER="${BASH_REMATCH[1]}"
            echo "release_version=$TAG_VER" >> "$GITHUB_OUTPUT"
            echo "Tag build: setting version to $TAG_VER"
          else
            POM_VER=$(grep -m1 '<version>' pom.xml | sed 's/.*<version>\(.*\)<\/version>.*/\1/')
            SHORT_SHA="${GITHUB_SHA:0:7}"
            echo "release_version=${POM_VER}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "Branch build: ${POM_VER}-${SHORT_SHA}"
          fi
      - name: Validate tag version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VER="${{ steps.version.outputs.release_version }}"
          POM_VER=$(grep -m1 '<version>' pom.xml | sed 's/.*<version>\(.*\)<\/version>.*/\1/')
          if [ "$TAG_VER" != "$POM_VER" ]; then
            echo "❌ Tag version (v$TAG_VER) != pom.xml version ($POM_VER)"
            echo "   Run 'bash tools/bump_version.sh release' first to sync versions."
            exit 1
          fi
          echo "✅ Tag v$TAG_VER matches pom.xml"
          LAST_TAG=$(git tag -l 'v*' | grep -v SNAPSHOT | sort -V | tail -1 || true)
          if [ -n "$LAST_TAG" ]; then
            LAST_VER="${LAST_TAG#v}"
            if [ "$LAST_VER" = "$TAG_VER" ]; then
              echo "❌ Version v$TAG_VER already released (tag $LAST_TAG)"
              exit 1
            fi
            HIGHER=$(printf '%s\n' "$LAST_VER" "$TAG_VER" | sort -V | tail -1)
            if [ "$HIGHER" != "$TAG_VER" ]; then
              echo "❌ Version v$TAG_VER is not higher than last release $LAST_TAG"
              exit 1
            fi
            echo "✅ v$TAG_VER > $LAST_TAG (last release)"
          else
            echo "⚠ No previous release tag found — first release"
          fi
      - name: Override pom.xml version on tag build
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mvn -q -B versions:set -DnewVersion="${{ steps.version.outputs.release_version }}" -DgenerateBackupPoms=false
      - name: Build with Maven
        run: bash build.sh
      - name: Verify JAR
        run: |
          jar=target/LazyContainerAgent.jar
          echo "=== MANIFEST ==="
          unzip -p "$jar" META-INF/MANIFEST.MF | grep -E 'Premain|Agent-Class|Retransform|Redefine'
          echo "=== Key agent classes ==="
          unzip -l "$jar" | grep -E '.*lazycontainer/([A-Z])' | grep -v '/$' | grep -v 'asm/'
          echo "=== Self-test ==="
          java -cp "$jar" io.github.kuohsuanlo.lazycontainer.DemoRunner
      - name: Rename JAR with version and JDK suffix
        run: |
          cp target/LazyContainerAgent.jar \
             "target/LazyContainerAgent-${{ steps.version.outputs.release_version }}-jdk${{ matrix.java }}.jar"
      - name: Upload JAR
        uses: actions/upload-artifact@v7
        with:
          name: LazyContainerAgent-jdk${{ matrix.java }}
          path: target/LazyContainerAgent-*.jar

  # ── 2. NMS Mapping Verification ──
  verify-mappings:
    name: Verify NMS Mappings
    if: (github.actor != 'github-actions[bot]' || startsWith(github.ref, 'refs/tags/')) && github.event.inputs.paper != 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Download Paper jars and verify mappings
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, subprocess, sys, os

          VERSIONS = {
              "1.21.11": None, "1.20.4": None, "1.19.4": None,
              "1.18.2": None, "1.17.1": None, "1.16.5": None,
          }

          with urllib.request.urlopen("https://launchermeta.mojang.com/mc/game/version_manifest_v2.json", timeout=15) as r:
              manifest = json.load(r)

          failed = []
          for version in VERSIONS:
              vinfo = next((v for v in manifest["versions"] if v["id"] == version), None)
              if not vinfo:
                  print(f"❌ {version}: no version info")
                  failed.append(version)
                  continue
              with urllib.request.urlopen(vinfo["url"], timeout=15) as r:
                  vdata = json.load(r)
              map_url = vdata.get("downloads", {}).get("server_mappings", {}).get("url", "")
              if not map_url:
                  print(f"⚠ {version}: no server_mappings file")
                  continue
              with urllib.request.urlopen(map_url, timeout=30) as r:
                  mapping_data = r.read().decode("utf-8")
              if "net.minecraft.world.ContainerHelper -> " in mapping_data:
                  print(f"✅ {version}: ContainerHelper mapping found")
                  for line in mapping_data.splitlines():
                      if line.startswith("net.minecraft.world.ContainerHelper -> "):
                          obf = line.split("->")[1].strip().rstrip(":")
                          print(f"   obfuscated name: {obf}")
                          break
              elif "net.minecraft.server.v1_16_R3/ContainerHelper" in mapping_data:
                  print(f"✅ {version}: ContainerHelper found (Spigot naming)")
              else:
                  print(f"❌ {version}: ContainerHelper NOT in mapping!")
                  failed.append(version)

              if "net.minecraft.world.level.storage.TagValueInput -> " in mapping_data:
                  print(f"   TagValueInput: present")
              else:
                  print(f"   TagValueInput: NOT present (pre-1.13 style)")

          if failed:
              print(f"\n❌ FAILED: {failed}")
              sys.exit(1)
          print("\n✅ All mapping checks passed")
          PYEOF

  # ── 3. Auto-release: PR merge to main → bump + tag ──
  auto-release:
    name: Auto release
    if: >
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Find merged PR and determine bump type
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Find PR merged via this commit
          PR_JSON=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" --jq '.[0]' 2>/dev/null || echo "null")
          if [ "$PR_JSON" = "null" ] || [ -z "$PR_JSON" ]; then
            echo "⚠ No merged PR found — defaulting to patch."
            echo "bump_type=patch" >> "$GITHUB_OUTPUT"
            echo "bump_source=default" >> "$GITHUB_OUTPUT"
            echo "pr_number=" >> "$GITHUB_OUTPUT"
          else
            PR_NUM=$(echo "$PR_JSON" | jq -r '.number')
            LABELS=$(echo "$PR_JSON" | jq -r '.labels[].name' | tr '\n' ' ')
            echo "PR #$PR_NUM labels: $LABELS"
            echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"
            if echo "$LABELS" | grep -q "bump:major"; then
              echo "bump_type=major" >> "$GITHUB_OUTPUT"
            elif echo "$LABELS" | grep -q "bump:minor"; then
              echo "bump_type=minor" >> "$GITHUB_OUTPUT"
            else
              echo "bump_type=patch" >> "$GITHUB_OUTPUT"
            fi
            echo "bump_source=pr#$PR_NUM" >> "$GITHUB_OUTPUT"
          fi
      - name: Read current version
        id: version
        run: |
          POM_VER=$(grep -m1 '<version>' pom.xml | sed 's/.*<version>\(.*\)<\/version>.*/\1/')
          BASE="${POM_VER%-SNAPSHOT}"
          echo "current=$POM_VER" >> "$GITHUB_OUTPUT"
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
      - name: Compute release and next-dev versions
        id: release
        run: |
          BASE="${{ steps.version.outputs.base }}"
          TYPE="${{ steps.pr.outputs.bump_type }}"
          echo "Base version: $BASE, Bump type: $TYPE"

          IFS='.' read -r -a PARTS <<< "$BASE"
          MAJOR="${PARTS[0]:-1}"
          MINOR="${PARTS[1]:-0}"
          PATCH="${PARTS[2]:--1}"

          case "$TYPE" in
            major)
              MAJOR=$((MAJOR + 1)); MINOR=0
              RELEASE="${MAJOR}.0"
              NEXT_DEV="${MAJOR}.0.1-SNAPSHOT"
              ;;
            minor)
              MINOR=$((MINOR + 1))
              RELEASE="${MAJOR}.${MINOR}"
              NEXT_DEV="${MAJOR}.${MINOR}.1-SNAPSHOT"
              ;;
            patch|*)
              if [ "$PATCH" -ge 0 ]; then
                # X.Y.Z → release X.Y.Z, next X.Y.(Z+1)-SNAPSHOT
                RELEASE="${MAJOR}.${MINOR}.${PATCH}"
                PATCH_NEXT=$((PATCH + 1))
                NEXT_DEV="${MAJOR}.${MINOR}.${PATCH_NEXT}-SNAPSHOT"
              else
                # X.Y (no patch) → release X.Y, next X.Y.1-SNAPSHOT
                RELEASE="${MAJOR}.${MINOR}"
                NEXT_DEV="${MAJOR}.${MINOR}.1-SNAPSHOT"
              fi
              ;;
          esac

          echo "release=$RELEASE" >> "$GITHUB_OUTPUT"
          echo "next_dev=$NEXT_DEV" >> "$GITHUB_OUTPUT"
          echo "→ Release: $RELEASE, Next dev: $NEXT_DEV"
      - name: Check version not already released
        run: |
          NEW_TAG="v${{ steps.release.outputs.release }}"
          if git tag -l | grep -q "^${NEW_TAG}$"; then
            echo "❌ Tag $NEW_TAG already exists! Bump type (${{ steps.pr.outputs.bump_type }}) may be wrong."
            exit 1
          fi
          echo "✅ $NEW_TAG is new"
      - name: Bump pom.xml on main, tag, push
        run: |
          RELEASE="${{ steps.release.outputs.release }}"
          mvn -q -B versions:set -DnewVersion="${RELEASE}" -DgenerateBackupPoms=false
          git add pom.xml pom.xml.versionsBackup 2>/dev/null || git add pom.xml
          git commit -m "release: v${RELEASE}"
          git tag -a "v${RELEASE}" -m "LazyContainerAgent v${RELEASE}"
          # Push commit + tag separately to ensure tag push triggers Create Release
          git push origin main
          git push origin "v${RELEASE}"
          echo "✅ Released v${RELEASE} on main"
      - name: Bump dev branch to next snapshot version
        run: |
          NEXT="${{ steps.release.outputs.next_dev }}"
          if ! git fetch origin dev 2>/dev/null; then
            echo "⚠ No dev branch — skipping"
            exit 0
          fi
          git checkout dev
          CURRENT_DEV=$(grep -m1 '<version>' pom.xml | sed 's/.*<version>\(.*\)<\/version>.*/\1/')
          if [ "$CURRENT_DEV" = "$NEXT" ]; then
            echo "⚠ Dev already at $NEXT — nothing to do"
            exit 0
          fi
          mvn -q -B versions:set -DnewVersion="${NEXT}" -DgenerateBackupPoms=false
          git add pom.xml pom.xml.versionsBackup 2>/dev/null || git add pom.xml
          git commit -m "bump version: ${NEXT}"
          git push origin dev
          echo "✅ Dev bumped: $CURRENT_DEV → $NEXT"
      - name: Print summary
        run: |
          echo "---"
          echo "📦 Release: v${{ steps.release.outputs.release }}"
          echo "🔖 Tag: v${{ steps.release.outputs.release }}"
          echo "🔄 Next dev: ${{ steps.release.outputs.next_dev }}"
          echo "🏷️  Bump type: ${{ steps.pr.outputs.bump_type }} (${{ steps.pr.outputs.bump_source }})"

  # ── 4. Create Release (triggered by v* tag from auto-release or manual push) ──
  release:
    name: Create Release
    needs: [build, verify-mappings]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v8
        with:
          path: release-artifacts
      - name: Generate release notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          cat > release-notes.md << EOF
          # LazyContainerAgent v$VERSION

          ## Artifacts
          $(for f in release-artifacts/*/*.jar; do
            name=$(basename $(dirname "$f"))
            base=$(basename "$f" .jar)
            jdkver="${name##*-}"
            echo "- \`$base.jar\` — Build with **${jdkver}**, works on any JDK ≥ ${jdkver#jdk}"
          done)

          > **哪個檔案才對？** 三個 JAR 內容完全一樣（agent target Java 21 bytecode），
          > 只是在不同 JDK 上各 build 一次確保相容。下載跟你的伺服器 JDK 主版本號相同的即可：
          > 伺服器用 JDK 21 → 拿 \`*-jdk21.jar\`，JDK 22 → \`*-jdk22.jar\`，依此類推。
          > 不確定的話執行 \`java -version\` 查看。

          ## Supported Versions
          | Version | Status |
          |---------|--------|
          | 1.21.11 | ✅ verified |
          | 1.20.4  | 🟡 mapping defined |
          | 1.19.4  | 🟡 mapping defined |
          | 1.18.2  | 🟡 mapping defined |
          | 1.17.1  | 🟡 mapping defined |
          | 1.16.5  | 🟡 mapping defined (Spigot) |
          | 1.12.2  | ❌ not supported (no ContainerHelper) |
          EOF
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: release-artifacts/*/*.jar
          draft: false
          prerelease: contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta')

  # ── 5. Nightly build from dev branch ──
  nightly:
    name: Nightly (dev)
    needs: [build, verify-mappings]
    if: github.ref == 'refs/heads/dev' && github.event_name != 'pull_request' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v8
        with:
          path: release-artifacts
      - name: Compute nightly version
        id: version
        run: |
          POM_VER=$(grep -m1 '<version>' pom.xml | sed 's/.*<version>\(.*\)<\/version>.*/\1/')
          SHORT_SHA="${GITHUB_SHA:0:7}"
          echo "version=${POM_VER}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Nightly version: ${POM_VER}-${SHORT_SHA}"
      - name: Generate nightly notes
        run: |
          cat > nightly-notes.md << EOF
          # LazyContainerAgent nightly build

          Nightly build from \`dev\` branch — may include unreleased changes.

          **Version:** ${{ steps.version.outputs.version }}

          ## Artifacts
          $(for f in release-artifacts/*/*.jar; do
            name=$(basename $(dirname "$f"))
            base=$(basename "$f" .jar)
            jdkver="${name##*-}"
            echo "- \`$base.jar\` — Build with **${jdkver}**, works on any JDK ≥ ${jdkver#jdk}"
          done)

          > 三個 JAR 內容相同，選跟你伺服器 JDK 版本相符的即可。
          EOF
      - uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          tag_name: v${{ steps.version.outputs.version }}
          body_path: nightly-notes.md
          files: release-artifacts/*/*.jar
          draft: false
          prerelease: true

  # ── 6. Remote manual bump (workflow_dispatch) ──
  bump:
    name: Bump version manually
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.bump_type != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: dev
          fetch-depth: 0
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Run bump_version.sh
        run: |
          bash tools/bump_version.sh "${{ github.event.inputs.bump_type }}"
      - name: Push
        run: |
          git push origin dev
          if [[ "${{ github.event.inputs.bump_type }}" == "release" ]]; then
            git push origin --tags
          fi
